<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07111f"><title>大A分析小助手 · A-Insight</title><style>html,body{margin:0;min-height:100%;background:#07111f;color:#f5f8fc;font-family:system-ui,"Microsoft YaHei",sans-serif}.boot{min-height:100vh;display:grid;place-items:center}.box{text-align:center}.orb{width:54px;height:54px;margin:auto;border:2px solid #263b5a;border-top-color:#5a8cff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:#8ea5bf;font-size:13px}</style></head><body><div class="boot"><div class="box"><div class="orb"></div><h2>A-Insight</h2><p>正在加载大A分析小助手…</p></div></div><script>(async()=>{try{const names=['payload1.txt','payload2.txt','payload3.txt','payload4.txt'];const b64=(await Promise.all(names.map(n=>fetch('./'+n,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error(r.status);return r.text()})))).join('');const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const ds=new DecompressionStream('gzip');const html=await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();const addons='<script src="./fix-market.js?v=20260717-1"><\/script><script src="./free-ai.js?v=20260717-1"><\/script>';const patched=html.includes('</body>')?html.replace('</body>',addons+'</body>'):html+addons;document.open();document.write(patched);document.close()}catch(e){document.body.innerHTML='<div class="boot"><div class="box"><h2>页面加载失败</h2><p>'+String(e)+'</p><button onclick="location.reload()">重新加载</button></div></div>'}})();</script></body></html>
